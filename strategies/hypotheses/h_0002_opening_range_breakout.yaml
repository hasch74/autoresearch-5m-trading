hypothesis_id: h_0002
name: opening_range_breakout
version: "0.4"

idea: >
  In the first 20 minutes (4 bars at 5m), define the opening range as
  [low_of_first_4_bars, high_of_first_4_bars].
  After bar 4, enter long when price breaks above the opening range high
  with sufficient breakout distance, acceptable ATR regime, and RVOL elevated.
  Stop: below the opening range low. Target: 2x the opening range width.

created_by: "human"
created_at: "2026-05-26"

universe: "liquid_us_largecaps"
timeframe: "5m"
holding_period_bars: 10
entry_type: "long"
direction_bias: "long_only"
risk_model: "fixed_fractional"

required_features:
  - or_high           # opening range high (first 4 bars)
  - or_low            # opening range low (first 4 bars)
  - rvol_20
  - atr_14

family: opening_range_breakout

parameters:
  or_bars: 4                  # bars defining the opening range (= 20 min)
  rvol_min: 1.0
  max_range_atr_ratio: 3.0    # skip if opening range > 3x ATR (too wide)
  min_breakout_bps: 12.0      # require breakout to clear OR high by at least 12 bps
  min_atr_pct_of_price: 0.003 # skip low-volatility bars where ATR/price is too small
  min_stop_atr_mult: 0.5      # floor after translating OR-low stop distance into ATR
  take_profit_range_mult: 2.0  # target = 2x opening range width above breakout
  max_hold_bars: 10

status: "draft"

eval: {}
